# DigitalOcean App Platform.
#
# Deploys on push to `production`. Set the secrets in the App Platform UI — they
# are the same values as server/.env; see server/.env.template for what each is.
name: gradbot-voice
region: nyc

services:
  - name: web
    dockerfile_path: Dockerfile
    source_dir: /
    github:
      repo: SkatAI/gradbot
      branch: production
      deploy_on_push: true
    http_port: 8282
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /health
    envs:
      - key: DEPLOY_ENV
        value: online
      - key: MAX_SESSIONS
        value: "5"
      - key: GRADIUM_API_KEY
        type: SECRET
      - key: OPENROUTER_API_KEY
        type: SECRET
      # Supabase: set SUPABASE_URL, SUPABASE_KEY, SUPABASE_SERVICE_ROLE_KEY and
      # SUPABASE_DB_URL here as SECRETs too.
